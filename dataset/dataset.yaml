# Rescue Vision - YOLOv8 Accident Detection Dataset Config
#
# Class layout:
#   0  bicycle
#   1  bicycle-bicycle_collision
#   2  bicycle-object_collision
#   3  bicycle-person_collision
#   4  car
#   5  car-bicycle_collision
#   6  car-car_collision
#   7  car-object_collision
#   8  car-person_collision
#   9  person

path:  datasets/archive
train: train/images
val:   valid/images

nc: 10

names:
  0: bicycle
  1: bicycle-bicycle_collision
  2: bicycle-object_collision
  3: bicycle-person_collision
  4: car
  5: car-bicycle_collision
  6: car-car_collision
  7: car-object_collision
  8: car-person_collision
  9: person
I’m reworking the upload flow itself, because the current design can never give you a true “instant popup at the accident second” experience. Right now uploads wait for a final result; I’m switching them to streamed processing so the uploaded video plays immediately, the backend analyzes in parallel, and the moment an accident frame is detected the video pauses and the big alert appears.

